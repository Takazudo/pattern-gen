# Pull request quality checks and preview deployment.
#
# Triggered on PRs targeting `main`. The pipeline:
#   1. Build the viewer app and doc site
#   2. Deploy a preview to Cloudflare Pages
#   3. Post the preview URL as a PR comment
#
# Concurrency: cancel in-progress runs for the same PR to save resources.

name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build the viewer app
  # ---------------------------------------------------------------------------
  build:
    name: Build Viewer & Doc
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build viewer
        run: pnpm run viewer:build

      - name: Build doc site
        run: pnpm run doc:build

      - name: Build styleguide
        run: pnpm run styleguide:build

      - name: Upload viewer artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist-viewer
          path: packages/pattern-gen-viewer/dist/
          retention-days: 1

      - name: Upload doc artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist-doc
          path: doc/dist/
          retention-days: 1

      - name: Upload styleguide artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist-styleguide
          path: packages/styleguide/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2: Deploy preview and comment on PR
  # ---------------------------------------------------------------------------
  preview:
    name: Preview Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download viewer artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist-viewer
          path: dist-viewer/

      - name: Download doc artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist-doc
          path: dist-doc/

      - name: Download styleguide artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist-styleguide
          path: dist-styleguide/

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/pj/pattern-gen
          cp -r dist-viewer/. deploy/pj/pattern-gen/
          cp -r dist-doc/. deploy/pj/pattern-gen/doc/
          cp -r dist-styleguide/. deploy/pj/pattern-gen/styleguide/
          echo '/ /pj/pattern-gen/ 302' > deploy/_redirects

      - name: Deploy preview to Cloudflare Pages
        id: cf-deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            if npx wrangler@4 pages deploy deploy \
              --project-name=zudo-pattern-gen \
              --branch="pr-${PR_NUMBER}" \
              --commit-hash="${GITHUB_SHA}" \
              --commit-message="Preview: PR #${PR_NUMBER}"; then
              echo "Deploy succeeded on attempt $attempt"
              DEPLOY_URL="https://pr-${PR_NUMBER}.zudo-pattern-gen.pages.dev"
              echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
              echo "Preview URL: $DEPLOY_URL"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed, retrying in 150 seconds..."
              sleep 150
            fi
          done
          echo "Deploy failed after 3 attempts"
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          DEPLOY_URL: ${{ steps.cf-deploy.outputs.deploy_url }}
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const prNumber = context.issue.number;
            const marker = '<!-- cf-preview-pr -->';

            const body = [
              marker,
              `## Cloudflare Pages Preview`,
              '',
              `Preview deployment is ready.`,
              '',
              `| Site | URL |`,
              `|---|---|`,
              `| Viewer | ${deployUrl}/pj/pattern-gen/ |`,
              `| Doc | ${deployUrl}/pj/pattern-gen/doc/ |`,
              `| Styleguide | ${deployUrl}/pj/pattern-gen/styleguide/ |`,
              '',
              `Built from commit: \`${context.sha.substring(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing preview comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new preview comment');
            }
